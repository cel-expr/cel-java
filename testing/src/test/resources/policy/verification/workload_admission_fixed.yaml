name: "workload_admission_fixed"
description: "Controls deployment of workloads to Kubernetes clusters."
rule:
  variables:
    - is_cluster_admin: "is_admin"
    - is_namespace_owner: "is_owner"
    - is_privileged_container: "is_privileged"
    - is_prod_cluster: "is_prod"
    - has_security_approval: "has_approval"

  match:
    # Hard DENY unapproved privileged containers in prod.
    - condition: "variables.is_privileged_container && variables.is_prod_cluster && !variables.has_security_approval"
      output: "'DENY'"
      explanation: "'Privileged containers in production require explicit security approval.'"

    # Break-glass admin bypass (Now safely guarded)
    - condition: "variables.is_cluster_admin"
      output: "'ALLOW'"

    # Namespace owners
    - condition: "variables.is_namespace_owner"
      output: "'ALLOW'"

    # Standard non-privileged deployments
    - condition: "!variables.is_privileged_container"
      output: "'ALLOW'"

    # Default Deny
    - output: "'DENY'"

verification:
  invariants:
    - id: universal_no_unapproved_privileged_prod
      description: >
        Guarantees that NO ONE can deploy a privileged container
        to production without explicit security approval, including admins.
      assume:
        - "variables.is_privileged_container"
        - "variables.is_prod_cluster"
        - "!variables.has_security_approval"
      assert:
        - "rule.result == 'DENY'"
