name: multi_invariant_policy
description: >
  Tests multi-invariant verification where one invariant passes
  ('admin_granted') and another is intentionally violated
  ('viewer_granted'), checking mixed counterexample reporting.
rule:
  match:
    - condition: role == 'admin' || role == 'editor'
      output: 'true'
    - output: 'false'
verification:
  invariants:
    - id: admin_granted
      description: Verifies that admin roles always evaluate to true.
      assume: role == 'admin'
      assert: rule.result == true
    - id: viewer_granted
      description: >
        Intentionally false assertion that viewer roles are granted
        permission, verifying that the solver detects the violation and
        reports 'role = "viewer"' as the counterexample.
      assume: role == 'viewer'
      assert: rule.result == true
