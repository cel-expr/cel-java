name: secure_resource_access
description: >
  Tests verifying security invariants across policy variables and protobuf
  message fields ('test_all_types.repeated_string').
rule:
  variables:
    - is_admin: "'admin' in test_all_types.repeated_string"
    - is_break_glass: "test_all_types.single_string != ''"
  match:
    - condition: variables.is_admin && variables.is_break_glass
      output: 'true'
    - output: 'false'
verification:
  variables:
    - is_unprivileged: "!('admin' in test_all_types.repeated_string)"
  invariants:
    - id: no_unprivileged_break_glass
      description: >
        Verifies that unprivileged users without the admin role can never
        trigger break-glass access.
      assume:
        - "variables.is_unprivileged"
      assert:
        - "rule.result == false"
